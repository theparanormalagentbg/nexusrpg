<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA RPG Narrativo</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .markdown p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown strong { color: #38bdf8; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONSTANTS & HELPERS ---
        const API_KEY = ""; // Injetado pelo ambiente
        const TEXT_MODEL = "gemini-2.5-flash-preview-09-2025";
        const IMAGE_MODEL = "gemini-2.5-flash-image-preview";

        const defaultPlayer = {
            name: "Desconhecido", image: "", race: "Humano", charClass: "Aventureiro",
            attributes: { str: 10, dex: 10, int: 10, cha: 10 },
            hp: 20, maxHp: 20, sanity: 100, maxSanity: 100, exp: 0, effort: 10, maxEffort: 10,
            backstory: "", skills: []
        };

        const defaultContext = { location: "Ponto de Partida", party: [] };
        
        const initialMusicState = {
            padrao: null, combate: null, boss: null, calmo: null, investigacao: null, tensao: null
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [gameState, setGameState] = useState('menu'); // menu, creation, playing
            const [campaignType, setCampaignType] = useState('original'); // original, custom
            
            // Core Game State
            const [player, setPlayer] = useState(defaultPlayer);
            const [gameContext, setGameContext] = useState(defaultContext);
            const [inventory, setInventory] = useState({ items: [], maxCapacity: 10 });
            const [relationships, setRelationships] = useState([]);
            const [storyLog, setStoryLog] = useState([]);
            
            // UI State
            const [activeTab, setActiveTab] = useState('chat'); // chat, inventory, relationships, music
            const [isLoading, setIsLoading] = useState(false);
            const [musicFiles, setMusicFiles] = useState(initialMusicState);
            const [activeMusicCategory, setActiveMusicCategory] = useState(null);
            
            const audioRef = useRef(new Audio());

            // --- SAVE / LOAD SYSTEM ---
            useEffect(() => {
                const saved = localStorage.getItem('rpg_save_data');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        setPlayer(data.player);
                        setGameContext(data.gameContext);
                        setInventory(data.inventory);
                        setRelationships(data.relationships);
                        setStoryLog(data.storyLog);
                        setGameState('playing');
                    } catch(e) { console.error("Erro ao carregar save", e); }
                }
            }, []);

            const saveGame = () => {
                const data = { player, gameContext, inventory, relationships, storyLog };
                localStorage.setItem('rpg_save_data', JSON.stringify(data));
                alert("Jogo salvo com sucesso!");
            };

            const exportGame = () => {
                const data = { player, gameContext, inventory, relationships, storyLog };
                const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `rpg_save_${new Date().getTime()}.json`;
                a.click();
            };

            const importGame = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        setPlayer(data.player);
                        setGameContext(data.gameContext);
                        setInventory(data.inventory);
                        setRelationships(data.relationships);
                        setStoryLog(data.storyLog);
                        setGameState('playing');
                    } catch(err) { alert("Arquivo de save inválido."); }
                };
                reader.readAsText(file);
            };

            // --- AUDIO SYSTEM ---
            useEffect(() => {
                if (activeMusicCategory && musicFiles[activeMusicCategory]) {
                    audioRef.current.src = musicFiles[activeMusicCategory];
                    audioRef.current.loop = true;
                    audioRef.current.play().catch(e => console.log("Auto-play prevented", e));
                } else {
                    audioRef.current.pause();
                }
            }, [activeMusicCategory, musicFiles]);

            const handleMusicUpload = (category, file) => {
                if (file) {
                    const url = URL.createObjectURL(file);
                    setMusicFiles(prev => ({ ...prev, [category]: url }));
                }
            };

            // --- API CALLS ---
            const callGeminiText = async (prompt, systemInstruction = "") => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${API_KEY}`;
                
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] }
                };

                let retries = 3;
                while (retries > 0) {
                    try {
                        const response = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });
                        const data = await response.json();
                        if (data.error) throw new Error(data.error.message);
                        return data.candidates[0].content.parts[0].text;
                    } catch (error) {
                        retries--;
                        if (retries === 0) throw error;
                        await new Promise(r => setTimeout(r, 2000));
                    }
                }
            };

            const generateImage = async (prompt) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:generateContent?key=${API_KEY}`;
                const payload = {
                    contents: [{ parts: [{ text: `Um retrato estilo RPG, arte conceitual, fantasia, de: ${prompt}` }] }],
                    generationConfig: { responseModalities: ["IMAGE"] }
                };

                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    const base64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    return base64 ? `data:image/png;base64,${base64}` : null;
                } catch (e) {
                    console.error("Erro ao gerar imagem:", e);
                    return null;
                }
            };

            // --- GAME LOGIC ---
            const startGame = async (setupData) => {
                setIsLoading(true);
                
                // Construct character based on input
                let newPlayer = { ...player, name: setupData.name, race: setupData.race, charClass: setupData.charClass };
                
                if (setupData.generateImage) {
                    const img = await generateImage(`${newPlayer.name}, um(a) ${newPlayer.race} ${newPlayer.charClass}`);
                    if (img) newPlayer.image = img;
                }

                const systemPrompt = `Você é um mestre de RPG ajudando a criar a ficha de um personagem.
                Baseado no Nome (${newPlayer.name}), Raça (${newPlayer.race}) e Classe (${newPlayer.charClass}), gere um JSON com Atributos (str, dex, int, cha), História de fundo curta (backstory) e 3 habilidades iniciais (skills array).
                Retorne APENAS um JSON válido.`;

                try {
                    const aiSetup = await callGeminiText("Gere os dados iniciais do personagem.", systemPrompt);
                    const parsed = JSON.parse(aiSetup.replace(/```json|```/g, '').trim());
                    
                    newPlayer = {
                        ...newPlayer,
                        attributes: parsed.attributes || newPlayer.attributes,
                        backstory: parsed.backstory || "Uma figura misteriosa.",
                        skills: parsed.skills || ["Ataque Básico"]
                    };
                    
                    setPlayer(newPlayer);
                    setGameContext({ location: "Início da Aventura", party: [] });
                    setGameState('playing');
                    
                    // Initial Prologue
                    handlePlayerAction("iniciar_campanha", `O jogador começou uma campanha no universo: ${setupData.universe || 'Padrão Fantasia Medieval'}. Gênero: ${setupData.genre}.`);

                } catch (error) {
                    console.error(error);
                    alert("Erro ao criar personagem com a IA. Tentando com dados padrão.");
                    setPlayer(newPlayer);
                    setGameState('playing');
                }
                setIsLoading(false);
            };

            const handlePlayerAction = async (actionType, text) => {
                if (!text.trim()) return;
                
                const userMessage = { role: 'user', content: `[${actionType.toUpperCase()}] ${text}` };
                setStoryLog(prev => [...prev, userMessage]);
                setIsLoading(true);

                // Build context for the AI
                const recentHistory = storyLog.slice(-10).map(l => `${l.role === 'user' ? 'Jogador' : 'Mestre'}: ${l.content}`).join('\n');
                
                const systemPrompt = `Você é o Game Master (Mestre) de um RPG de texto. 
                Sua tarefa é narrar a história de forma imersiva e responsiva às ações do jogador.
                
                REGRAS DE NARRATIVA:
                - O jogador escolhe a ação: AÇÃO (tenta fazer algo), FALA (diz algo) ou DESCRIÇÃO (pergunta sobre o ambiente/lore).
                - Seja descritivo, mas mantenha a ação fluindo. Não escreva blocos de texto gigantescos de uma vez.
                
                ESTADO ATUAL DO JOGO (Para seu conhecimento):
                Personagem: ${player.name} (${player.race} ${player.charClass}). Vida: ${player.hp}/${player.maxHp}. Sanidade: ${player.sanity}/${player.maxSanity}. Esforço: ${player.effort}/${player.maxEffort}.
                Local Atual: ${gameContext.location}.
                NPCs no grupo: ${gameContext.party.join(', ') || 'Nenhum'}.
                Inventário: ${inventory.items.map(i => i.name).join(', ') || 'Vazio'}.
                Relacionamentos Chave: ${relationships.map(r => `${r.name} (${r.status})`).join('; ')}.

                MUITO IMPORTANTE - ATUALIZAÇÃO DE ESTADO:
                Você tem o poder de alterar o estado do jogo. No final da sua resposta narrativa, você DEVE incluir um bloco de código JSON isolado começando com \`\`\`json e terminando com \`\`\` com as atualizações que ocorreram neste turno.
                Se nada mudou, envie valores vazios/nulos.
                
                Formato do JSON exigido no final:
                \`\`\`json
                {
                  "hp_change": 0,
                  "sanity_change": 0,
                  "effort_change": 0,
                  "exp_gain": 0,
                  "new_location": "Nome do Local Atualizado se mudou ou null",
                  "party_updates": ["Lista atualizada de quem acompanha o jogador, ou null se sem mudança"],
                  "inventory_add": [{"name": "Nome", "desc": "Descricao", "type": "weapon/item/document", "damage": "1d6 (se arma)", "content": "Texto se for documento"}],
                  "inventory_remove": ["Nome do item a remover"],
                  "new_relationships": [{"name": "Nome NPC", "status": "Aliado/Inimigo/Neutro", "backstory": "Resumo", "personality": "Resumo", "appearance": "Descricao visual"}],
                  "suggested_music": "padrao|combate|boss|calmo|investigacao|tensao"
                }
                \`\`\`
                `;

                try {
                    const aiResponse = await callGeminiText(`Histórico recente:\n${recentHistory}\n\nAção atual do jogador: ${userMessage.content}`, systemPrompt);
                    
                    // Parse response
                    const jsonMatch = aiResponse.match(/```json\n([\s\S]*?)\n```/);
                    let narrativeText = aiResponse;
                    let stateUpdates = null;

                    if (jsonMatch && jsonMatch[1]) {
                        narrativeText = aiResponse.replace(jsonMatch[0], '').trim();
                        try {
                            stateUpdates = JSON.parse(jsonMatch[1]);
                            applyStateUpdates(stateUpdates);
                        } catch(e) { console.error("Falha ao processar JSON da IA", e); }
                    }

                    setStoryLog(prev => [...prev, { role: 'ai', content: narrativeText }]);

                } catch (error) {
                    console.error(error);
                    setStoryLog(prev => [...prev, { role: 'system', content: "Ocorreu uma distorção na malha da realidade (Erro de API). Tente novamente." }]);
                }
                setIsLoading(false);
            };

            const applyStateUpdates = (updates) => {
                if (!updates) return;

                setPlayer(p => ({
                    ...p,
                    hp: Math.max(0, Math.min(p.maxHp, p.hp + (updates.hp_change || 0))),
                    sanity: Math.max(0, Math.min(p.maxSanity, p.sanity + (updates.sanity_change || 0))),
                    effort: Math.max(0, Math.min(p.maxEffort, p.effort + (updates.effort_change || 0))),
                    exp: p.exp + (updates.exp_gain || 0)
                }));

                if (updates.new_location) {
                    setGameContext(prev => ({ ...prev, location: updates.new_location }));
                }
                if (updates.party_updates && Array.isArray(updates.party_updates)) {
                    setGameContext(prev => ({ ...prev, party: updates.party_updates }));
                }

                if (updates.inventory_add && updates.inventory_add.length > 0) {
                    setInventory(prev => ({
                        ...prev,
                        items: [...prev.items, ...updates.inventory_add].slice(0, prev.maxCapacity)
                    }));
                }
                if (updates.inventory_remove && updates.inventory_remove.length > 0) {
                    setInventory(prev => ({
                        ...prev,
                        items: prev.items.filter(i => !updates.inventory_remove.includes(i.name))
                    }));
                }

                if (updates.new_relationships && updates.new_relationships.length > 0) {
                    setRelationships(prev => {
                        let newRels = [...prev];
                        updates.new_relationships.forEach(nr => {
                            if (!newRels.find(r => r.name === nr.name)) {
                                newRels.push({ ...nr, id: Date.now() + Math.random() });
                            }
                        });
                        return newRels;
                    });
                }

                if (updates.suggested_music) {
                    setActiveMusicCategory(updates.suggested_music);
                }
            };

            // --- RENDERERS ---
            if (gameState === 'menu') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="glass-panel p-8 rounded-2xl max-w-md w-full text-center shadow-2xl">
                            <h1 className="text-4xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">Chronos IA RPG</h1>
                            <p className="text-slate-400 mb-8">Forje seu destino através de narrativas infinitas.</p>
                            
                            <div className="space-y-4">
                                <button onClick={() => { setCampaignType('original'); setGameState('creation'); }} className="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-semibold transition">
                                    Campanha Rápida (Original)
                                </button>
                                <button onClick={() => { setCampaignType('custom'); setGameState('creation'); }} className="w-full py-3 px-4 bg-slate-700 hover:bg-slate-600 rounded-lg font-semibold transition border border-slate-500">
                                    Campanha Personalizada
                                </button>
                                
                                <div className="pt-4 border-t border-slate-700 flex justify-center">
                                    <label className="cursor-pointer text-sm text-cyan-400 hover:text-cyan-300">
                                        Importar Save
                                        <input type="file" accept=".json" className="hidden" onChange={importGame} />
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'creation') {
                return <CharacterCreationForm campaignType={campaignType} onStart={startGame} onBack={() => setGameState('menu')} isLoading={isLoading} />;
            }

            return (
                <div className="flex flex-col h-screen bg-slate-900">
                    {/* TOP HEADER */}
                    <header className="glass-panel flex flex-col md:flex-row justify-between items-center p-3 z-10 shadow-md">
                        {/* Player Stats */}
                        <div className="flex items-center space-x-4 w-full md:w-auto">
                            <div className="w-14 h-14 rounded-full bg-slate-800 border-2 border-indigo-500 overflow-hidden flex-shrink-0">
                                {player.image ? <img src={player.image} alt="Player" className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-500 text-xs">Sem Foto</div>}
                            </div>
                            <div className="flex-1 min-w-0">
                                <h2 className="font-bold text-lg truncate">{player.name}</h2>
                                <div className="flex gap-2 text-xs">
                                    <span className="text-red-400">❤️ {player.hp}/{player.maxHp}</span>
                                    <span className="text-purple-400">🧠 {player.sanity}/{player.maxSanity}</span>
                                    <span className="text-yellow-400">⚡ {player.effort}/{player.maxEffort}</span>
                                    <span className="text-green-400">⭐ {player.exp} XP</span>
                                </div>
                            </div>
                        </div>

                        {/* Context Info */}
                        <div className="mt-3 md:mt-0 text-right w-full md:w-auto bg-slate-800 p-2 rounded border border-slate-700">
                            <div className="text-sm font-semibold text-cyan-400">📍 {gameContext.location}</div>
                            <div className="text-xs text-slate-400 truncate max-w-[200px]">👥 Grupo: {gameContext.party.length > 0 ? gameContext.party.join(', ') : 'Sozinho'}</div>
                        </div>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 flex flex-col md:flex-row overflow-hidden relative">
                        
                        {/* MOBILE TABS NAV */}
                        <div className="md:hidden flex overflow-x-auto bg-slate-800 border-b border-slate-700">
                            {['chat', 'inventory', 'relationships', 'music', 'system'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-sm font-medium capitalize whitespace-nowrap ${activeTab === tab ? 'text-indigo-400 border-b-2 border-indigo-400' : 'text-slate-400'}`}>
                                    {tab === 'chat' ? 'História' : tab === 'inventory' ? 'Inventário' : tab === 'relationships' ? 'NPCs' : tab === 'music' ? 'Músicas' : 'Sistema'}
                                </button>
                            ))}
                        </div>

                        {/* LEFT/CENTER: CHAT (Always visible on desktop, tab on mobile) */}
                        <div className={`flex-1 flex-col relative ${activeTab === 'chat' ? 'flex' : 'hidden md:flex'}`}>
                            <ChatLog logs={storyLog} isLoading={isLoading} />
                            <InputArea onSend={handlePlayerAction} isLoading={isLoading} />
                        </div>

                        {/* RIGHT: SIDEBAR TABS (Hidden on mobile if not active) */}
                        <div className={`w-full md:w-80 bg-slate-800/50 border-l border-slate-700 flex-col overflow-y-auto ${activeTab !== 'chat' ? 'flex md:flex' : 'hidden md:flex'}`}>
                            
                            {/* Desktop Tab Headers */}
                            <div className="hidden md:flex flex-wrap bg-slate-800 border-b border-slate-700">
                                {['inventory', 'relationships', 'music', 'system'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 px-2 py-3 text-xs font-semibold uppercase tracking-wider ${activeTab === tab ? 'text-cyan-400 bg-slate-700/50' : 'text-slate-400 hover:text-slate-200'}`}>
                                        {tab === 'inventory' ? 'Inv' : tab === 'relationships' ? 'NPCs' : tab === 'music' ? 'Som' : 'Sis'}
                                    </button>
                                ))}
                            </div>

                            <div className="p-4 flex-1 overflow-y-auto">
                                {activeTab === 'inventory' && <InventoryPanel inventory={inventory} />}
                                {activeTab === 'relationships' && <RelationshipsPanel relationships={relationships} setRelationships={setRelationships} />}
                                {activeTab === 'music' && <MusicPanel musicFiles={musicFiles} handleUpload={handleMusicUpload} activeCategory={activeMusicCategory} setActiveCategory={setActiveMusicCategory} />}
                                {activeTab === 'system' && (
                                    <div className="space-y-4">
                                        <h3 className="font-bold text-lg border-b border-slate-600 pb-2">Sistema</h3>
                                        <button onClick={saveGame} className="w-full py-2 bg-slate-700 hover:bg-slate-600 rounded">Salvar Progresso (Local)</button>
                                        <button onClick={exportGame} className="w-full py-2 bg-indigo-700 hover:bg-indigo-600 rounded">Exportar Save</button>
                                        <div className="p-3 bg-red-900/30 border border-red-700/50 rounded text-xs text-red-200 mt-4">
                                            Atenção: Limpar o cache do navegador apaga os saves locais. Músicas carregadas precisam ser readicionadas após recarregar a página por motivos de segurança do navegador.
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- SUB-COMPONENTS ---

        function CharacterCreationForm({ campaignType, onStart, onBack, isLoading }) {
            const [formData, setFormData] = useState({
                name: '', race: 'Humano', charClass: 'Aventureiro', 
                universe: '', genre: 'Fantasia', generateImage: true
            });

            const handleChange = (e) => setFormData({...formData, [e.target.name]: e.target.type === 'checkbox' ? e.target.checked : e.target.value});

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass-panel p-6 rounded-xl w-full max-w-lg shadow-xl max-h-[90vh] overflow-y-auto">
                        <h2 className="text-2xl font-bold mb-4">Criação de Personagem e Mundo</h2>
                        
                        <div className="space-y-4">
                            {campaignType === 'custom' && (
                                <>
                                    <div>
                                        <label className="block text-sm text-slate-400 mb-1">Universo/Cenário</label>
                                        <input type="text" name="universe" value={formData.universe} onChange={handleChange} placeholder="Ex: Cyberpunk, Senhor dos Anéis..." className="w-full p-2 bg-slate-800 rounded border border-slate-600 focus:border-indigo-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-slate-400 mb-1">Gênero/Clima</label>
                                        <input type="text" name="genre" value={formData.genre} onChange={handleChange} placeholder="Ex: Terror psicológico, Aventura épica..." className="w-full p-2 bg-slate-800 rounded border border-slate-600 outline-none" />
                                    </div>
                                </>
                            )}
                            {campaignType === 'original' && (
                                <div>
                                    <label className="block text-sm text-slate-400 mb-1">Gênero da História</label>
                                    <select name="genre" value={formData.genre} onChange={handleChange} className="w-full p-2 bg-slate-800 rounded border border-slate-600 outline-none">
                                        <option>Fantasia Medieval</option><option>Ficção Científica</option><option>Investigação Noir</option><option>Horror Cósmico</option>
                                    </select>
                                </div>
                            )}

                            <div className="border-t border-slate-700 my-4"></div>

                            <div>
                                <label className="block text-sm text-slate-400 mb-1">Nome do Personagem</label>
                                <input type="text" name="name" value={formData.name} onChange={handleChange} required className="w-full p-2 bg-slate-800 rounded border border-slate-600 outline-none" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm text-slate-400 mb-1">Raça</label>
                                    <input type="text" name="race" value={formData.race} onChange={handleChange} className="w-full p-2 bg-slate-800 rounded border border-slate-600 outline-none" />
                                </div>
                                <div>
                                    <label className="block text-sm text-slate-400 mb-1">Classe/Profissão</label>
                                    <input type="text" name="charClass" value={formData.charClass} onChange={handleChange} className="w-full p-2 bg-slate-800 rounded border border-slate-600 outline-none" />
                                </div>
                            </div>
                            
                            <label className="flex items-center space-x-2 mt-4 cursor-pointer text-sm text-slate-300">
                                <input type="checkbox" name="generateImage" checked={formData.generateImage} onChange={handleChange} className="rounded text-indigo-500 bg-slate-800" />
                                <span>Gerar retrato com IA (Pode demorar um pouco)</span>
                            </label>

                            <div className="flex gap-3 mt-6">
                                <button onClick={onBack} disabled={isLoading} className="flex-1 py-2 bg-slate-700 hover:bg-slate-600 rounded transition disabled:opacity-50">Voltar</button>
                                <button onClick={() => onStart(formData)} disabled={!formData.name || isLoading} className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-500 font-bold rounded transition disabled:opacity-50 flex justify-center items-center">
                                    {isLoading ? <span className="animate-pulse">Criando...</span> : 'Iniciar Aventura'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function ChatLog({ logs, isLoading }) {
            const endRef = useRef(null);
            
            useEffect(() => {
                endRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [logs, isLoading]);

            const formatText = (text) => {
                return text.split('\n').map((line, i) => <p key={i} className="mb-2">{line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>);
            };

            return (
                <div className="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-hide">
                    {logs.length === 0 && (
                        <div className="h-full flex items-center justify-center text-slate-500 italic">
                            O silêncio preenche o vazio. O que você fará?
                        </div>
                    )}
                    {logs.map((log, index) => (
                        <div key={index} className={`flex ${log.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                            <div className={`max-w-[85%] rounded-xl p-4 ${log.role === 'user' ? 'bg-indigo-600 text-white rounded-br-none' : log.role === 'system' ? 'bg-red-900/50 text-red-200 border border-red-800 mx-auto text-center text-sm' : 'glass-panel rounded-bl-none markdown text-slate-200'}`}>
                                {formatText(log.content)}
                            </div>
                        </div>
                    ))}
                    {isLoading && (
                        <div className="flex justify-start">
                            <div className="glass-panel rounded-xl rounded-bl-none p-4 w-24 flex justify-center items-center space-x-2">
                                <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce"></div>
                                <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                            </div>
                        </div>
                    )}
                    <div ref={endRef} />
                </div>
            );
        }

        function InputArea({ onSend, isLoading }) {
            const [text, setText] = useState('');
            const [mode, setMode] = useState('ação');

            const handleSubmit = (e) => {
                e.preventDefault();
                if(!text.trim() || isLoading) return;
                onSend(mode, text);
                setText('');
            };

            return (
                <form onSubmit={handleSubmit} className="p-3 bg-slate-800 border-t border-slate-700 flex flex-col sm:flex-row gap-2">
                    <div className="flex flex-1 gap-2 bg-slate-900 p-1 rounded-lg border border-slate-600 focus-within:border-indigo-500">
                        <select value={mode} onChange={e => setMode(e.target.value)} className="bg-transparent text-sm font-semibold text-slate-300 outline-none pl-2 border-r border-slate-700 cursor-pointer">
                            <option value="ação">Ação</option>
                            <option value="fala">Fala</option>
                            <option value="descrição">Investigar</option>
                        </select>
                        <input type="text" value={text} onChange={e => setText(e.target.value)} disabled={isLoading} placeholder={`Digite sua ${mode}...`} className="flex-1 bg-transparent p-2 outline-none text-white placeholder-slate-500" />
                    </div>
                    <button type="submit" disabled={!text.trim() || isLoading} className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-lg font-bold disabled:opacity-50 transition w-full sm:w-auto">
                        Enviar
                    </button>
                </form>
            );
        }

        function InventoryPanel({ inventory }) {
            const [selectedDoc, setSelectedDoc] = useState(null);

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center border-b border-slate-700 pb-2">
                        <h3 className="font-bold text-lg">Mochila</h3>
                        <span className="text-sm text-slate-400">{inventory.items.length} / {inventory.maxCapacity}</span>
                    </div>
                    {inventory.items.length === 0 ? (
                        <p className="text-slate-500 italic text-sm text-center">Seus bolsos estão vazios.</p>
                    ) : (
                        <ul className="space-y-2">
                            {inventory.items.map((item, idx) => (
                                <li key={idx} className="bg-slate-700/50 p-2 rounded border border-slate-600 flex flex-col">
                                    <div className="flex justify-between items-start">
                                        <span className="font-semibold text-sm text-indigo-300">{item.name}</span>
                                        {item.damage && <span className="text-xs bg-red-900/50 text-red-300 px-1 rounded">{item.damage}</span>}
                                    </div>
                                    <p className="text-xs text-slate-400 mt-1">{item.desc}</p>
                                    {item.type === 'document' && (
                                        <button onClick={() => setSelectedDoc(selectedDoc === idx ? null : idx)} className="mt-2 text-xs bg-slate-600 hover:bg-slate-500 py-1 rounded">
                                            {selectedDoc === idx ? 'Fechar' : 'Ler Documento'}
                                        </button>
                                    )}
                                    {selectedDoc === idx && item.content && (
                                        <div className="mt-2 p-2 bg-slate-800 rounded text-xs border border-slate-600 font-serif italic text-slate-300">
                                            "{item.content}"
                                        </div>
                                    )}
                                </li>
                            ))}
                        </ul>
                    )}
                </div>
            );
        }

        function RelationshipsPanel({ relationships, setRelationships }) {
            const editNpc = (id, field, value) => {
                setRelationships(prev => prev.map(r => r.id === id ? { ...r, [field]: value } : r));
            };

            return (
                <div className="space-y-4">
                    <h3 className="font-bold text-lg border-b border-slate-700 pb-2">Vínculos</h3>
                    {relationships.length === 0 ? (
                        <p className="text-slate-500 italic text-sm text-center">Ninguém cruzou seu caminho de forma significativa ainda.</p>
                    ) : (
                        <ul className="space-y-4">
                            {relationships.map(npc => (
                                <li key={npc.id} className="bg-slate-700/30 p-3 rounded-lg border border-slate-600">
                                    <div className="flex items-center gap-3 mb-2">
                                        <div className="w-10 h-10 bg-slate-600 rounded-full flex-shrink-0 overflow-hidden border border-slate-500">
                                            {npc.image ? <img src={npc.image} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center text-[10px]">NPC</div>}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="font-bold text-sm truncate text-cyan-300">{npc.name}</div>
                                            <div className={`text-xs font-semibold ${npc.status.toLowerCase().includes('inimigo') ? 'text-red-400' : npc.status.toLowerCase().includes('aliado') ? 'text-green-400' : 'text-slate-400'}`}>
                                                {npc.status}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-2 mt-2">
                                        <div>
                                            <label className="text-[10px] uppercase text-slate-500 font-bold block">Personalidade</label>
                                            <input type="text" value={npc.personality || ''} onChange={(e) => editNpc(npc.id, 'personality', e.target.value)} className="w-full bg-slate-800 text-xs p-1 rounded border border-slate-600" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase text-slate-500 font-bold block">História</label>
                                            <textarea value={npc.backstory || ''} onChange={(e) => editNpc(npc.id, 'backstory', e.target.value)} className="w-full bg-slate-800 text-xs p-1 rounded border border-slate-600 resize-none h-16" />
                                        </div>
                                    </div>
                                </li>
                            ))}
                        </ul>
                    )}
                </div>
            );
        }

        function MusicPanel({ musicFiles, handleUpload, activeCategory, setActiveCategory }) {
            const categories = [
                { id: 'padrao', label: 'Exploração Padrão', icon: '🌲' },
                { id: 'combate', label: 'Combate Geral', icon: '⚔️' },
                { id: 'boss', label: 'Batalha de Chefe', icon: '💀' },
                { id: 'calmo', label: 'Descanso/Taverna', icon: '🔥' },
                { id: 'investigacao', label: 'Mistério', icon: '🔎' },
                { id: 'tensao', label: 'Tensão/Horror', icon: '⚠️' }
            ];

            return (
                <div className="space-y-4">
                    <h3 className="font-bold text-lg border-b border-slate-700 pb-2">Trilha Sonora</h3>
                    <p className="text-xs text-slate-400 mb-4">A IA mudará a faixa automaticamente com base na cena. Faça o upload das suas músicas (MP3/WAV) para cada situação.</p>
                    
                    <div className="space-y-3">
                        {categories.map(cat => (
                            <div key={cat.id} className={`p-3 rounded border ${activeCategory === cat.id ? 'bg-indigo-900/40 border-indigo-500' : 'bg-slate-700/30 border-slate-600'}`}>
                                <div className="flex justify-between items-center mb-2">
                                    <span className="font-semibold text-sm flex items-center gap-2">{cat.icon} {cat.label}</span>
                                    {musicFiles[cat.id] && <span className="text-[10px] bg-green-900/50 text-green-400 px-2 py-1 rounded">Carregada</span>}
                                </div>
                                <div className="flex items-center gap-2 mt-1">
                                    <label className="text-xs bg-slate-600 hover:bg-slate-500 px-2 py-1 rounded cursor-pointer transition flex-1 text-center">
                                        Escolher Arquivo
                                        <input type="file" accept="audio/*" onChange={(e) => handleUpload(cat.id, e.target.files[0])} className="hidden" />
                                    </label>
                                    {musicFiles[cat.id] && (
                                        <button onClick={() => setActiveCategory(cat.id)} className="text-xs bg-indigo-600 hover:bg-indigo-500 px-2 py-1 rounded">
                                            Testar
                                        </button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
